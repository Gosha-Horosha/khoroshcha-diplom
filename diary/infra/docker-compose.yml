services:
  # PostgreSQL database
#  postgres:
#    image: postgres:15
#    environment:
#      POSTGRES_DB: postgres
#      POSTGRES_USER: postgres
#      POSTGRES_PASSWORD: eight2004
#    ports:
#      - "5432:5432"
#    volumes:
#      - postgres_data:/var/lib/postgresql/data
#      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
#    networks:
#      - diary-network

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:eight2004@host.docker.internal:5432/postgres
      SECRET_KEY: gerryndiy
      DEBUG: "false"
    ports:
      - "8000:8000"
#    depends_on:
#      - postgres
    networks:
      - diary-network
    volumes:
      - ../backend:/app
      - backend_logs:/app/logs

  # Frontend application
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - diary-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - diary-network

  # Redis for caching (опционально)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - diary-network

volumes:
  postgres_data:
  backend_logs:

networks:
  diary-network:
    driver: bridge