<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(19, 26, 45, 0.92);
      --panel-border: rgba(255,255,255,0.08);
      --text: #f3f6ff;
      --muted: rgba(243,246,255,0.68);
      --accent: #6f76ff;
      --accent-2: #8b5cf6;
      --danger: #ff8e8e;
      --success: #79e7a8;
      --shadow: 0 24px 70px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(111,118,255,0.18), transparent 32%),
        linear-gradient(180deg, #0a0f1b 0%, #0b1020 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(520px, 100%);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      padding: 28px;
      display: grid;
      gap: 18px;
    }
    .eyebrow {
      display: inline-flex;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(111,118,255,0.12);
      color: #cfd4ff;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 { margin: 0; font-size: clamp(1.8rem, 1.5rem + 0.8vw, 2.3rem); }
    p { margin: 0; color: var(--muted); line-height: 1.6; }
    form { display: grid; gap: 14px; }
    label { display: grid; gap: 8px; font-size: 14px; }
    input {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 14px 16px;
      outline: none;
    }
    input:focus { border-color: rgba(111,118,255,0.45); }
    button {
      min-height: 48px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { opacity: 0.7; cursor: wait; }
    .message, .error {
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }
    .message { background: rgba(121,231,168,0.12); color: var(--success); border: 1px solid rgba(121,231,168,0.2); }
    .error { background: rgba(255,142,142,0.12); color: var(--danger); border: 1px solid rgba(255,142,142,0.2); }
    .links { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    a { color: #cfd4ff; text-decoration: none; }
    .hint { font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <main class="card">
    <span class="eyebrow">Archive</span>
    <div>
      <h1>New password</h1>
      <p>Set a new password to log in to your account</p>
    </div>

    <div id="successMessage" class="message"></div>
    <div id="errorMessage" class="error"></div>

    <form id="resetForm">
      <label>
        New password
        <input id="password" type="password" placeholder="More than 8 symbols" required minlength="8" />
      </label>

      <label>
        Repeat the password
        <input id="confirmPassword" type="password" placeholder="Repeat the password" required minlength="8" />
      </label>

      <p class="hint">The link must contain a token in the address bar</p>
      <button id="submitBtn" type="submit">Save Password</button>
    </form>

    <div class="links">
      <a href="/login.html">Back to entrance</a>
      <a href="/forgot-password.html">Request a new link</a>
    </div>
  </main>

  <script>
    const form = document.getElementById('resetForm');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const successMessage = document.getElementById('successMessage');
    const errorMessage = document.getElementById('errorMessage');
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      errorMessage.textContent = 'Can not find token.';
      errorMessage.style.display = 'block';
      submitBtn.disabled = true;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      successMessage.style.display = 'none';
      errorMessage.style.display = 'none';

      if (!token) {
        errorMessage.textContent = 'Token did not find';
        errorMessage.style.display = 'block';
        return;
      }

      if (passwordInput.value !== confirmPasswordInput.value) {
        errorMessage.textContent = 'Passwords do not match';
        errorMessage.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving...';

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token,
            new_password: passwordInput.value
          })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.detail || 'Failed to update the password');
        }

        successMessage.textContent = data.message || 'The password has been updated. You may now log in..';
        successMessage.style.display = 'block';
        form.reset();
        setTimeout(() => {
          window.location.href = '/login.html';
        }, 1800);
      } catch (error) {
        errorMessage.textContent = error.message || 'Error';
        errorMessage.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save password';
      }
    });
  </script>
</body>
</html>
