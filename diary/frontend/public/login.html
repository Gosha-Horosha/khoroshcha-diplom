<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Diary Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --radius-sm: 0.375rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.25rem;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --color-bg: #090f1c;
      --color-surface: #101827;
      --color-surface-2: #152033;
      --color-surface-3: #1a2940;
      --color-border: rgba(199, 214, 255, 0.12);
      --color-border-strong: rgba(199, 214, 255, 0.2);
      --color-text: #edf2ff;
      --color-text-muted: #aeb7d3;
      --color-text-faint: #75809c;
      --color-primary: #94aacd;
      --color-primary-strong: #b6c7ea;
      --color-accent: #6f789f;
      --color-accent-soft: rgba(143, 156, 204, 0.14);
      --shadow-sm: 0 10px 30px rgba(2, 6, 17, 0.24);
      --shadow-lg: 0 24px 80px rgba(1, 5, 16, 0.52);
      --glow: 0 0 0 1px rgba(182, 199, 234, 0.08), 0 0 30px rgba(120, 144, 196, 0.12);
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.55;
      color: var(--color-text);
      background:
        radial-gradient(circle at top left, rgba(111, 120, 159, 0.17), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(148, 170, 205, 0.09), transparent 20%),
        linear-gradient(180deg, #0b1220 0%, #080d18 100%);
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1.5rem, 4vw, 3rem);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 120px 120px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 88%);
      opacity: 0.18;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }

    .page {
      width: 100%;
      max-width: 720px;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-pane {
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-shell {
      width: 100%;
      max-width: 480px;
      border: 1px solid var(--color-border);
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(18, 26, 40, 0.96), rgba(10, 15, 25, 0.98));
      box-shadow: var(--shadow-lg), var(--glow);
      backdrop-filter: blur(16px);
      padding: clamp(2rem, 2.5vw + 1rem, 2.75rem);
      margin-inline: auto;
    }

    .auth-header {
      display: grid;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }

    .eyebrow {
      color: var(--color-primary);
      font-size: var(--text-xs);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .auth-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 2.2vw + 1rem, 2.4rem);
      line-height: 1;
      margin: 0;
      font-weight: 600;
    }

    .auth-subtitle {
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      margin: 0;
      max-width: 38ch;
    }

    .auth-form {
      display: grid;
      gap: var(--space-5);
    }

    .field {
      display: grid;
      gap: var(--space-2);
    }

    .field label {
      font-size: var(--text-sm);
      color: var(--color-text);
      font-weight: 500;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 0.95rem;
      top: 50%;
      translate: 0 -50%;
      width: 18px;
      height: 18px;
      color: var(--color-text-faint);
      pointer-events: none;
    }

    .field input {
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      border: 1px solid var(--color-border);
      background: rgba(255,255,255,0.03);
      padding: 0.95rem 1rem 0.95rem 2.9rem;
      color: var(--color-text);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .field input::placeholder {
      color: var(--color-text-faint);
    }

    .field input:focus {
      border-color: rgba(182, 199, 234, 0.38);
      box-shadow: 0 0 0 4px rgba(148, 170, 205, 0.1), var(--glow);
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    .checkbox {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      cursor: pointer;
    }

    .checkbox input {
      appearance: none;
      width: 18px;
      height: 18px;
      margin: 0;
      border-radius: 6px;
      border: 1px solid var(--color-border-strong);
      background: rgba(255,255,255,0.03);
      display: grid;
      place-items: center;
      padding: 0;
      min-height: 18px;
    }

    .checkbox input:checked {
      background: rgba(148, 170, 205, 0.16);
      border-color: rgba(182, 199, 234, 0.45);
    }

    .checkbox input:checked::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 3px;
      background: var(--color-primary-strong);
      box-shadow: 0 0 10px rgba(182, 199, 234, 0.35);
    }

    .text-link {
      color: var(--color-primary-strong);
    }

    .primary-btn {
      min-height: 54px;
      width: 100%;
      border: 1px solid rgba(182, 199, 234, 0.22);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(147, 166, 205, 0.18), rgba(108, 123, 160, 0.18));
      color: var(--color-text);
      font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow: var(--glow);
      cursor: pointer;
    }

    .primary-btn:hover,
    .primary-btn:focus-visible {
      transform: translateY(-1px);
      background: linear-gradient(180deg, rgba(158, 179, 218, 0.22), rgba(119, 135, 174, 0.2));
    }

    .divider {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      color: var(--color-text-faint);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: var(--space-2) 0;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    .secondary-actions {
      display: grid;
      gap: var(--space-2);
    }

    .secondary-btn {
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      border-radius: 14px;
      border: 1px solid var(--color-border);
      background: rgba(255,255,255,0.02);
      color: var(--color-text-muted);
      font-size: var(--text-xs);
    }

    .secondary-btn:hover {
      border-color: var(--color-border-strong);
      color: var(--color-text);
      background: rgba(255,255,255,0.04);
    }

    .auth-footer {
      margin-top: var(--space-6);
      display: flex;
      justify-content: center;
      gap: var(--space-2);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }

    @media (max-width: 480px) {
      body { padding: 1rem; }
      .auth-shell { border-radius: 24px; padding: 1.5rem; }
      .form-row {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <a class="sr-only" href="#main">Skip to content</a>
  <div class="page">
    <main id="main" class="auth-pane">
      <section class="auth-shell" aria-labelledby="login-title">
        <header class="auth-header">
          <div class="eyebrow">Welcome back</div>
          <h1 id="login-title" class="auth-title">Sign in to continue the thread.</h1>
          <p class="auth-subtitle">Open your archive, revisit unfinished thoughts, and return to the branches you were following.</p>
        </header>

        <form class="auth-form">
          <div class="field">
            <label for="email">Email</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
                <path d="M4 6h16v12H4z"></path>
                <path d="m4 7 8 6 8-6"></path>
              </svg>
              <input id="email" name="email" type="email" placeholder="you@archive.app" autocomplete="email" />
            </div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
                <rect x="4" y="11" width="16" height="9" rx="2"></rect>
                <path d="M8 11V8a4 4 0 1 1 8 0v3"></path>
              </svg>
              <input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
            </div>
          </div>

          <div class="form-row">
            <label class="checkbox" for="remember">
              <input id="remember" type="checkbox" name="remember" checked />
              <span>Keep me in the archive</span>
            </label>
            <a class="text-link" href="#" id = "forgot-link">Forgot password?</a>
          </div>

          <button class="primary-btn" type="submit">Enter Night Archive</button>

          <div class="divider">or continue with</div>

          <div class="secondary-actions">
            <button class="secondary-btn" type="button" id="google-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21.8 10.2h-9.6v3.6h5.5c-.2 1.3-1.6 3.8-5.5 3.8-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.2.8 4 1.5l2.7-2.6C17.2 2.9 15 2 12.2 2 6.6 2 2 6.6 2 12.2s4.6 10.2 10.2 10.2c5.9 0 9.8-4.1 9.8-9.9 0-.7-.1-1.3-.2-1.9Z"/></svg>
              Continue with Google
            </button>
            <button class="secondary-btn" type="button" id="apple-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16.365 1.43c0 1.14-.466 2.203-1.246 2.963-.804.78-1.91 1.247-3.035 1.165-.145-1.066.352-2.201 1.114-2.986.79-.818 2.055-1.405 3.167-1.142Zm3.79 16.477c-.505 1.133-.746 1.64-1.395 2.61-.905 1.35-2.184 3.03-3.77 3.042-1.408.013-1.77-.918-3.68-.906-1.91.011-2.307.925-3.715.912-1.587-.012-2.798-1.528-3.702-2.878-2.53-3.778-2.798-8.215-1.235-10.623 1.11-1.712 2.86-2.715 4.505-2.715 1.677 0 2.732.92 4.119.92 1.344 0 2.163-.922 4.105-.922 1.467 0 3.019.801 4.128 2.183-3.626 1.99-3.037 7.178.64 8.377Z"/></svg>
              Continue with Apple
            </button>
          </div>
        </form>

        <footer class="auth-footer">
          <span>New here?</span>
          <a class="text-link" href="#" id="create-account-link">Create an account</a>
        </footer>
      </section>
    </main>
  </div>

<script>
  const form = document.querySelector('.auth-form');
  const googleBtn = document.getElementById('google-btn');
  const appleBtn = document.getElementById('apple-btn');
  const createAccountLink = document.getElementById('create-account-link');
  const forgotLink = document.getElementById('forgot-link');

  const API_BASE = 'http://localhost:8000';

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = form.email.value.trim();
    const password = form.password.value;

    if (!email || !password) {
      alert('Пожалуйста, введите email и пароль');
      return;
    }

    const payload = { email, password };

    try {
      const res = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        const msg = data.detail || 'Неверный email или пароль';
        alert(msg);
        return;
      }

      const data = await res.json();
      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('token_type', data.token_type || 'bearer');

      window.location.href = '/dashboard-page.html';
    } catch (err) {
      console.error(err);
      alert('Ошибка соединения с сервером');
    }
  });

   forgotLink.addEventListener('click', (e) => {
  e.preventDefault();
  alert('Не забывай пароль 🙂');
});

  googleBtn.addEventListener('click', () => {
    alert('OAuth через Google пока не реализован.\nИспользуйте логин по email и паролю.');
  });

  appleBtn.addEventListener('click', () => {
    alert('Авторизация через Apple не реализована.\nЭто зарезервировано как расширение.');
  });

  createAccountLink.addEventListener('click', (e) => {
    e.preventDefault();
    window.location.href = '/register-page.html'; // сделаешь позже
  });
</script>
</body>
</html>
